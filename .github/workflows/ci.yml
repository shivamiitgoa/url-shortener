name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run tests
        env:
          GCP_PROJECT_ID: ci-test-project
          GOOGLE_CLOUD_PROJECT: ci-test-project
        run: npm test

      - name: Build
        run: npm run build
